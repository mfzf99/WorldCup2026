    function normalizeTeamName(name) {
      if (!name) return '';
      const mapping = {
        'Czech Republic': 'Czechia',
        'Turkey': 'Türkiye',
        'United States': 'USA',
        'Bosnia and Herzegovina': 'Bosnia',
        'Democratic Republic of the Congo': 'DR Congo'
      };
      return mapping[name] || name;
    }

    function fmtDate(s) {
      const d = new Date(s + 'T12:00:00');
      return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()} ${d.getFullYear()}`;
    }

    function formatTime12H(tStr) {
      if (!tStr) return '';
      const [hStr, mStr] = tStr.split(':');
      let h = parseInt(hStr, 10);
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12;
      h = h ? h : 12; 
      return `${h}:${mStr} ${ampm}`;
    }

    function getMood(t) {
      const h = parseInt(t);
      if (h < 6)  return { icon:'🌙', label:'Midnight' };
      if (h < 12) return { icon:'🌅', label:'Morning' };
      if (h < 17) return { icon:'☀️', label:'Afternoon' };
      return { icon:'🌆', label:'Evening' };
    }

    function getFlagUrl(teamName) {
      if (!teamName) return null;
      const code = FLAG_CODES[teamName];
      if (!code) return null;
      return `https://flagcdn.com/w160/${code}.png`;
    }

    function getMatchStatus(m, now) {
      if (m.api_finished) {
        return { code: 'TAMAT', label: 'FINISHED', class: 'bg-slate-800 text-slate-400 border border-slate-700 font-bold' };
      }
      if (m.api_live) {
        return { code: 'LIVE', label: 'LIVE 🔥', class: 'bg-red-500 text-white animate-pulse shadow-lg shadow-red-500/50 font-black' };
      }

      const matchTime = new Date(`${m.d}T${m.t}:00`);
      const diffMs = now - matchTime; 
      const diffHours = diffMs / (1000 * 60 * 60);

      if (diffHours >= 0 && diffHours <= 2) {
        return { code: 'LIVE', label: 'LIVE 🔥', class: 'bg-red-500 text-white animate-pulse shadow-lg shadow-red-500/50 font-black' };
      } else if (diffHours > 2) {
        return { code: 'TAMAT', label: 'FINISHED', class: 'bg-slate-800 text-slate-400 border border-slate-700' };
      } else {
        const minsLeft = Math.ceil(Math.abs(diffMs) / (1000 * 60));
        if (minsLeft <= 30) {
          return { code: 'AKAN_DATANG', label: `STARTS IN ${minsLeft}M ⏳`, class: 'bg-amber-500/20 text-amber-400 border border-amber-500/50 animate-pulse font-extrabold' };
        } else if (minsLeft < 1440) { 
          const h = Math.floor(minsLeft / 60);
          const m = minsLeft % 60;
          return { code: 'AKAN_DATANG', label: `STARTS IN ${h}H ${m}M`, class: 'bg-cyan-950 text-cyan-400 border border-cyan-500/30 font-bold' };
        } else {
          return { code: 'AKAN_DATANG', label: 'UPCOMING', class: 'bg-slate-900 text-slate-500 border border-slate-800' };
        }
      }
    }

    // ── GROUP CARD ───────────────────────────────────────────────────────────
    function GroupCard({ m, isFav, toggleFav, now }) {
      const c = GC[m.g] || '#00E8FF';
      const mood = getMood(m.t);
      const status = getMatchStatus(m, now);
      const hasScore = m.home_score !== null && m.home_score !== undefined;
      
      return (

          style={{ borderColor: `${c}25`, borderTop: `3px solid ${c}` }}
        >
          <div>
            <div class="flex justify-between items-center mb-4">

                GROUP {m.g}
              </span>
              <div class="flex items-center gap-2">
                <span class="text-xs text-slate-400">{mood.icon}</span>
                <button 
                  onClick={(e) => { e.stopPropagation(); toggleFav(m.h, m.a); }}
                  class="text-sm focus:outline-none transition-transform active:scale-75"
                >
                  {isFav ? '⭐' : '☆'}
                </button>
              </div>
            </div>

            <div class="grid grid-cols-3 items-center gap-1 my-2">
              <div class="flex flex-col items-center text-center">
                <div class="w-14 h-9 overflow-hidden rounded shadow-md border border-slate-800 flex items-center justify-center bg-slate-950 transform group-hover:scale-105 transition-transform duration-300">
                  {getFlagUrl(m.h) ? <img src={getFlagUrl(m.h)} alt={m.h} class="w-full h-full object-cover" /> : <span class="text-xl">🏳️</span>}
                </div>
                <span class="text-[11px] font-extrabold text-slate-200 mt-2 line-clamp-1 w-full">{m.h}</span>
              </div>

              <div class="text-center px-1">
                {hasScore ? (
                  <div class="mono text-lg font-black text-amber-400 tracking-tight drop-shadow-[0_0_10px_rgba(245,197,24,0.3)]">{m.home_score} - {m.away_score}</div>
                ) : (
                  <div class="mono text-[13px] font-black text-cyan-400 tracking-wide drop-shadow-[0_0_8px_rgba(6,182,212,0.4)] whitespace-nowrap">{formatTime12H(m.t)}</div>
                )}
                <div class="text-[8px] font-extrabold tracking-widest text-slate-500 mt-0.5">MYT</div>
                <div class="text-[9px] font-black text-slate-600 mt-1 tracking-widest">VS</div>
              </div>

              <div class="flex flex-col items-center text-center">
                <div class="w-14 h-9 overflow-hidden rounded shadow-md border border-slate-800 flex items-center justify-center bg-slate-950 transform group-hover:scale-105 transition-transform duration-300">
                  {getFlagUrl(m.a) ? <img src={getFlagUrl(m.a)} alt={m.a} class="w-full h-full object-cover" /> : <span class="text-xl">🏳️</span>}
                </div>
                <span class="text-[11px] font-extrabold text-slate-200 mt-2 line-clamp-1 w-full">{m.a}</span>
              </div>
            </div>
          </div>

          <div class="mt-4 pt-3 border-t border-slate-800/60 flex items-center justify-between text-[10px]">
            <span class="text-slate-500 truncate max-w-[110px]">📍 {m.v}</span>
            <span class={`px-2 py-0.5 rounded font-black tracking-wider text-[9px] ${status.class}`}>{status.label}</span>
          </div>
        </div>
      );
    }

    // ── KNOCKOUT CARD ────────────────────────────────────────────────────────
    function KoCard({ m, now }) {
      const isFinal = m.phase === 'FINAL';
      const isBronze = m.phase === 'BRONZE';
      const c = isFinal ? '#F5C518' : isBronze ? '#CD7F32' : '#00E8FF';
      const mood = getMood(m.t);
      const status = getMatchStatus(m, now);
      const hasScore = m.home_score !== null && m.home_score !== undefined;

      return (
        <div 
          className="glass rounded-xl p-4 border transition-all duration-300 hover:-translate-y-1 relative flex flex-col justify-between"
          style={{ borderColor: `${c}25`, borderTop: `3px solid ${c}`, background: isFinal ? 'linear-gradient(180deg, rgba(245,197,24,0.05) 0%, rgba(15,23,42,0.8) 100%)' : '' }}
        >
          <div>
            <div class="flex justify-between items-center mb-3">
              <span class="text-[10px] font-extrabold tracking-wider px-2 py-0.5 rounded-full" style={{ background: `${c}15`, border: `1px solid ${c}40`, color: c }}>
                {PHASE_LABELS[m.phase]} #{m.n}
              </span>
              <span class="text-xs text-slate-400">{mood.icon}</span>
            </div>

            <div class="flex items-center justify-around my-4">
              <div class="text-center flex-1">
                <div class="w-12 h-8 overflow-hidden rounded shadow-sm border border-slate-800 flex items-center justify-center bg-slate-950 mx-auto">
                  {getFlagUrl(m.h) ? <img src={getFlagUrl(m.h)} alt="" class="w-full h-full object-cover" /> : <span class="text-lg">⚽</span>}
                </div>
                <div class="text-[11px] font-bold text-slate-300 mt-2 truncate max-w-[80px] mx-auto">{m.h || 'TBD'}</div>
              </div>
              
              <div class="text-center px-2">
                {hasScore ? (
                  <div class="mono text-lg font-black tracking-tight text-amber-400 shadow-amber-500/20">{m.home_score} - {m.away_score}</div>
                ) : (
                  <div class="mono text-sm font-black tracking-wider whitespace-nowrap" style={{ color: c, textShadow: `0 0 10px ${c}60` }}>{formatTime12H(m.t)}</div>
                )}
                <div class="text-[8px] font-extrabold tracking-widest text-slate-500 mt-0.5">MYT</div>
              </div>

              <div class="text-center flex-1">
                <div class="w-12 h-8 overflow-hidden rounded shadow-sm border border-slate-800 flex items-center justify-center bg-slate-950 mx-auto">
                  {getFlagUrl(m.a) ? <img src={getFlagUrl(m.a)} alt="" class="w-full h-full object-cover" /> : <span class="text-lg">⚽</span>}
                </div>
                <div class="text-[11px] font-bold text-slate-300 mt-2 truncate max-w-[80px] mx-auto">{m.a || 'TBD'}</div>
              </div>
            </div>
          </div>

          <div class="mt-4 pt-3 border-t border-slate-800/60 flex items-center justify-between text-[10px]">
            <span class="text-slate-500">📍 {m.v}</span>
            <span class={`px-2 py-0.5 rounded font-black tracking-wider text-[9px] ${status.class}`}>{status.label}</span>
          </div>
        </div>
      );
    }

    // ── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState('GS');
      const [grp, setGrp] = useState('ALL');
      const [statusFilter, setStatusFilter] = useState('ALL');
      const [favOnly, setFavOnly] = useState(false);
      const [q, setQ] = useState('');
      const [now, setNow] = useState(new Date());
      
      // State Simpanan Data API Mentah
      const [apiGames, setApiGames] = useState([]);

      const [favTeams, setFavTeams] = useState(() => {
        const saved = localStorage.getItem('wc2026_fav_teams');
        return saved ? JSON.parse(saved) : [];
      });

      // Fungsi Menggali Data API worldcup26.ir secara berkala
      const fetchLiveScores = () => {
        fetch("https://worldcup26.ir/get/games", {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${API_TOKEN}`,
            "Content-Type": "application/json"
          }
        })
        .then(res => res.json())
        .then(data => {
          if (data && data.games) {
            setApiGames(data.games);
          }
        })
        .catch(err => console.error("API error skipped:", err));
      };

      useEffect(() => {
        fetchLiveScores();
        const apiInterval = setInterval(fetchLiveScores, 30000); // Hit API setiap 30 saat
        const timeInterval = setInterval(() => setNow(new Date()), 1000);

        return () => {
          clearInterval(apiInterval);
          clearInterval(timeInterval);
        };
      }, []);

      useEffect(() => {
        localStorage.setItem('wc2026_fav_teams', JSON.stringify(favTeams));
      }, [favTeams]);

      // Menggabungkan data API Live bersama Array Static Tempatan (Group Stage)
      const liveGSArray = useMemo(() => {
        return GS.map(m => {
          const matchData = apiGames.find(g => {
            if (g.type !== 'group') return false;
            const apiHome = normalizeTeamName(g.home_team_name_en);
            const apiAway = normalizeTeamName(g.away_team_name_en);
            return (apiHome === m.h && apiAway === m.a) || (apiHome === m.a && apiAway === m.h);
          });
          if (matchData) {
            return {
              ...m,
              home_score: matchData.home_score !== 'null' ? matchData.home_score : null,
              away_score: matchData.away_score !== 'null' ? matchData.away_score : null,
              api_live: matchData.finished === 'FALSE' && matchData.time_elapsed !== 'notstarted',
              api_finished: matchData.finished === 'TRUE'
            };
          }
          return m;
        });
      }, [apiGames]);

      // Menggabungkan data API Live bersama Array Static Tempatan (Knockout Rounds)
      const liveKOArray = useMemo(() => {
        return KO.map(m => {
          const matchData = apiGames.find(g => g.type !== 'group' && Number(g.id) === m.id);
          if (matchData) {
            const resolvedHome = matchData.home_team_name_en && matchData.home_team_id !== "0" ? normalizeTeamName(matchData.home_team_name_en) : null;
            const resolvedAway = matchData.away_team_name_en && matchData.away_team_id !== "0" ? normalizeTeamName(matchData.away_team_name_en) : null;
            return {
              ...m,
              h: resolvedHome || m.h || matchData.home_team_label || 'TBD',
              a: resolvedAway || m.a || matchData.away_team_label || 'TBD',
              home_score: matchData.home_score !== 'null' ? matchData.home_score : null,
              away_score: matchData.away_score !== 'null' ? matchData.away_score : null,
              api_live: matchData.finished === 'FALSE' && matchData.time_elapsed !== 'notstarted',
              api_finished: matchData.finished === 'TRUE'
            };
          }
          return m;
        });
      }, [apiGames]);

      const toggleFav = (teamA, teamB) => {
        setFavTeams(prev => {
          const hasA = prev.includes(teamA);
          const hasB = prev.includes(teamB);
          if (hasA && hasB) {
            return prev.filter(t => t !== teamA && t !== teamB);
          } else {
            return [...new Set([...prev, teamA, teamB])];
          }
        });
      };

      const TABS = [
        {id:'GS',    label:'⚽ Group Stage'},
        {id:'R32',   label:'Round of 32'},
        {id:'R16',   label:'Round of 16'},
        {id:'QF',    label:'Quarter-finals'},
        {id:'SF',    label:'Semi-finals'},
        {id:'BRONZE',label:'3rd Place Match 🥉'},
        {id:'FINAL', label:'FINAL 🏆'},
      ];

      const filteredMatches = useMemo(() => {
        let arr = tab === 'GS' ? liveGSArray : liveKOArray.filter(m => m.phase === tab);
        if (tab === 'GS' && grp !== 'ALL') arr = arr.filter(m => m.g === grp);
        if (statusFilter !== 'ALL') {
          arr = arr.filter(m => getMatchStatus(m, now).code === statusFilter);
        }
        if (favOnly) {
          arr = arr.filter(m => favTeams.includes(m.h) || favTeams.includes(m.a));
        }
        if (q.trim()) {
          const lq = q.toLowerCase();
          arr = arr.filter(m =>
            (m.h||'').toLowerCase().includes(lq) ||
            (m.a||'').toLowerCase().includes(lq) ||
            (m.v||'').toLowerCase().includes(lq)
          );
        }
        return arr;
      }, [tab, grp, statusFilter, favOnly, q, favTeams, now, liveGSArray, liveKOArray]);

      const groupedByDate = useMemo(() => {
        const map = {};
        for (const m of filteredMatches) {
          if (!map[m.d]) map[m.d] = [];
          map[m.d].push(m);
        }
        return Object.entries(map).sort(([a],[b]) => (a < b ? -1 : 1));
      }, [filteredMatches]);

      const nextMatch = useMemo(() => {
        const all = [...liveGSArray, ...liveKOArray].sort((a,b) => new Date(`${a.d}T${a.t}`) - new Date(`${b.d}T${b.t}`));
        return all.find(m => new Date(`${m.d}T${m.t}`) - now > 0);
      }, [now, liveGSArray, liveKOArray]);

      const isGS = tab === 'GS';
      const todayStr = now.toLocaleDateString('sv-SE');

      return (
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
          
          {/* ── HEADER HERO ────────────────────────────────── */}
          <div class="relative rounded-3xl overflow-hidden glass border border-slate-800/80 p-6 sm:p-10 mb-8 shadow-2xl shadow-cyan-950/20">
            <div class="absolute -top-24 -left-20 w-80 h-80 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute -bottom-24 -right-20 w-80 h-80 bg-amber-500/5 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 relative z-10">
              <div>
                <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-white mt-1 bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text">
                  2026 FIFA WORLD CUP SCHEDULE
                </h1>
                <p class="text-cyan-400 font-bold tracking-wide mt-2 text-sm sm:text-base">
                  MALAYSIA TIME · MYT (UTC+8)
                </p>
                <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-xs text-slate-400 mt-4 font-medium">
                  <span>🇲🇽 Mexico · 🇨🇦 Canada · 🇺🇸 USA</span>
                  <span class="text-slate-700">•</span>
                  <span>104 Matches</span>
                  <span class="text-slate-700">•</span>
                  <span>June 11 – July 20, 2026</span>
                </div>
              </div>

              {/* Countdown Widget */}
              {nextMatch && (
                <div class="bg-slate-950/60 border border-slate-800 p-4 rounded-2xl min-w-[290px] shadow-inner flex flex-col justify-between">
                  <div>
                    <div class="text-[10px] font-bold tracking-widest text-slate-500 uppercase">Next Match</div>
                    <div class="flex items-center gap-2 mt-2.5">
                      <div class="flex items-center gap-1.5 bg-slate-900/90 px-2 py-1 rounded border border-slate-800">
                        {getFlagUrl(nextMatch.h) ? (
                          <img src={getFlagUrl(nextMatch.h)} alt="" class="w-4 h-2.5 object-cover rounded-sm shadow-sm" />
                        ) : (
                          <span class="text-xs">⚽</span>
                        )}
                        <span class="text-[11px] font-bold text-slate-300 max-w-[65px] truncate">{nextMatch.h || 'TBD'}</span>
                      </div>
                      <span class="text-[9px] font-bold text-slate-600">VS</span>
                      <div class="flex items-center gap-1.5 bg-slate-900/90 px-2 py-1 rounded border border-slate-800">
                        {getFlagUrl(nextMatch.a) ? (
                          <img src={getFlagUrl(nextMatch.a)} alt="" class="w-4 h-2.5 object-cover rounded-sm shadow-sm" />
                        ) : (
                          <span class="text-xs">⚽</span>
                        )}
                        <span class="text-[11px] font-bold text-slate-300 max-w-[65px] truncate">{nextMatch.a || 'TBD'}</span>
                      </div>
                    </div>
                  </div>
                  <div class="mt-4 flex items-baseline justify-between gap-2 border-t border-slate-900 pt-2.5">
                    <div class="flex flex-col">
                      <span class="mono text-xs font-black text-slate-300">{formatTime12H(nextMatch.t)}</span>
                      <span class="text-[9px] text-slate-500 font-semibold truncate max-w-[100px]">{fmtDate(nextMatch.d)}</span>
                    </div>
                    <div class="text-right">
                      <div class="text-[8px] font-bold text-slate-500 tracking-wider uppercase">Starts In</div>
                      <div class="mono text-xs font-extrabold text-amber-400 bg-amber-500/5 border border-amber-500/20 px-2 py-0.5 rounded shadow-sm">
                        {(() => {
                          const mTime = new Date(`${nextMatch.d}T${nextMatch.t}:00`);
                          const diff = mTime - now;
                          if (diff <= 0) return "Starting Soon...";
                          const s = Math.floor((diff / 1000) % 60);
                          const m = Math.floor((diff / (1000 * 60)) % 60);
                          const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                          const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                          return `${d > 0 ? d + 'd ' : ''}${h > 0 || d > 0 ? h + 'h ' : ''}${m}m ${s}s`;
                        })()}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* ── NAVIGATION STICKY ──────────────── */}
          <div class="sticky top-4 z-40 bg-slate-950/80 backdrop-blur-md p-3 rounded-2xl border border-slate-800/80 shadow-xl mb-6">
            <div class="flex gap-2 overflow-x-auto pb-2 sm:pb-0 no-scrollbar">
              {TABS.map(t => (
                <button
                  key={t.id}
                  onClick={() => { setTab(t.id); setGrp('ALL'); }}
                  class={`px-4 py-2 rounded-xl text-xs font-extrabold tracking-wide whitespace-nowrap transition-all duration-200 ${
                    tab === t.id 
                      ? 'bg-gradient-to-r from-amber-400 to-amber-500 text-slate-950 shadow-md shadow-amber-500/20 scale-[1.02]' 
                      : 'bg-slate-900/60 text-slate-400 hover:text-white hover:bg-slate-800/60 border border-slate-800/40'
                  }`}
                >
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* ── SEARCH & FILTER CONSOLE ───────── */}
          <div class="glass border border-slate-800/60 rounded-2xl p-4 mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="relative">
              <input 
                type="text" 
                placeholder="Search country, venue city..."
                value={q}
                onChange={e => setQ(e.target.value)}
                class="w-full bg-slate-950/80 border border-slate-800 rounded-xl px-4 py-2.5 text-xs text-slate-300 focus:outline-none focus:border-cyan-500/50 placeholder-slate-600 font-medium transition-colors"
              />
            </div>

            <div class="flex gap-2">
              {['ALL', 'LIVE', 'AKAN_DATANG', 'TAMAT'].map(status => (
                <button
                  key={status}
                  onClick={() => setStatusFilter(status)}
                  class={`flex-1 py-2 px-1 rounded-xl text-[10px] font-bold border transition-all ${
                    statusFilter === status 
                      ? 'bg-cyan-500/10 text-cyan-400 border-cyan-500/40' 
                      : 'bg-slate-950/40 text-slate-500 border-slate-900 hover:text-slate-300'
                  }`}
                >
                  {status === 'ALL' ? 'ALL' : status === 'LIVE' ? 'LIVE 🔥' : status === 'AKAN_DATANG' ? 'UPCOMING' : 'FINISHED'}
                </button>
              ))}
            </div>

            <div class="flex items-center justify-end">
              <button
                onClick={() => setFavOnly(!favOnly)}
                class={`w-full md:w-auto px-4 py-2.5 rounded-xl text-xs font-bold border flex items-center justify-center gap-2 transition-all ${
                  favOnly 
                    ? 'bg-amber-400/10 text-amber-400 border-amber-400/30' 
                    : 'bg-slate-950/40 text-slate-500 border-slate-900 hover:text-slate-400'
                }`}
              >
                <span>{favOnly ? '⭐ Showing Favorites' : '☆ Filter Favorite Teams'}</span>
                {favTeams.length > 0 && <span class="bg-amber-400 text-slate-950 text-[9px] px-1.5 py-0.5 rounded-full font-black">{favTeams.length}</span>}
              </button>
            </div>
          </div>

          {/* GROUP CHIPS */}
          {isGS && (
            <div class="flex gap-1.5 overflow-x-auto pb-4 no-scrollbar">
              <button
                onClick={() => setGrp('ALL')}
                class={`px-3 py-1.5 rounded-lg text-[10px] font-black tracking-wider transition-all ${
                  grp === 'ALL' ? 'bg-slate-100 text-slate-950' : 'bg-slate-900/60 text-slate-500 border border-slate-800/30'
                }`}
              >
                ALL GROUPS
              </button>
              {'ABCDEFGHIJKL'.split('').map(g => (
                <button
                  key={g}
                  onClick={() => setGrp(g)}
                  class={`px-3 py-1.5 rounded-lg text-[10px] font-black transition-all ${
                    grp === g ? 'text-white' : 'bg-slate-900/20 text-slate-400 hover:text-slate-400'
                  }`}
                  style={{ backgroundColor: grp === g ? GC[g] : '', border: `1px solid ${GC[g]}20` }}
                >
                  GRP {g}
                </button>
              ))}
            </div>
          )}

          {/* ACTIVE GROUP INFO STRIP */}
          {isGS && grp !== 'ALL' && GROUPS[grp] && (
            <div class="glass border rounded-xl p-3 mb-6 flex flex-wrap gap-4 items-center" style={{ borderColor: `${GC[grp]}30`, background: `${GC[grp]}05` }}>
              <span class="text-xs font-black tracking-widest uppercase" style={{ color: GC[grp] }}>GROUP {grp}:</span>
              <div class="flex flex-wrap gap-3">
                {GROUPS[grp].map(t => (
                  <span key={t} class={`text-xs font-semibold px-2 py-1 rounded bg-slate-900/80 border border-slate-800 flex items-center gap-1.5 ${favTeams.includes(t) ? 'text-amber-400 border-amber-500/30' : 'text-slate-300'}`}>
                    <img src={getFlagUrl(t)} alt="" class="w-4 h-2.5 object-cover rounded-sm" />
                    {t}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* ── MATCH LIST ────────────────────── */}
          <div class="space-y-8">
            {groupedByDate.length === 0 ? (
              <div class="text-center text-slate-600 py-16 text-sm font-medium border border-dashed border-slate-900 rounded-2xl">
                📭 No matches found matching your filters.
              </div>
            ) : (
              groupedByDate.map(([date, matches]) => {
                const isToday = date === todayStr;
                return (
                  <div key={date} class="relative">
                    <div class="flex items-center gap-4 my-4 sticky top-16 z-30 py-2 bg-slate-1000">
                      <div class={`px-4 py-1.5 rounded-full text-xs font-extrabold tracking-wide flex items-center gap-2 ${
                        isToday ? 'bg-red-600 text-white shadow-md shadow-red-600/30' : 'bg-slate-900 text-slate-400 border border-slate-800'
                      }`}>
                        {isToday && <span class="w-2 h-2 rounded-full bg-white animate-ping"></span>}
                        {fmtDate(date)} {isToday && '· TODAY'}
                      </div>
                      <div class="flex-1 h-[1px] bg-gradient-to-r from-slate-800 via-slate-950 to-transparent"></div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                      {matches.map(m => isGS ? (
                        <GroupCard 
                          key={m.id} 
                          m={m} 
                          now={now}
                          isFav={favTeams.includes(m.h) || favTeams.includes(m.a)} 
                          toggleFav={toggleFav}
                        />
                      ) : (
                        <KoCard key={m.id} now={now} />
                      ))}
                    </div>
                  </div>
                );
              })
            )}
          </div>

          {/* FOOTER */}
          <footer class="mt-16 pt-6 border-t border-slate-900 text-center text-[10px] text-slate-600 font-medium tracking-wide flex flex-col items-center gap-1.5">
            <span>All match times are configured to Malaysia Time (MYT - UTC+8). Data synced live via worldcup26.ir secure nodes.</span>
            <span class="text-slate-500 font-bold mt-0.5 tracking-wider">©2026 mfzf. All rights reserved.</span>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
