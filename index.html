// ── Card Components ───────────────────────────────────────────────────────────
function GroupCard({ m, isHov, onEnter, onLeave }) {
  const c    = GC[m.g];
  const mood = getMood(m.t);
  const isToday = m.d === TODAY;
  return (
    <div
      className="mcard"
      onMouseEnter={onEnter}
      onMouseLeave={onLeave}
      style={{
        background: 'rgba(7,16,38,0.96)',
        border: `1px solid ${isHov ? c + 'AA' : c + '30'}`,
        borderTop: `3px solid ${c}`,
        borderRadius: 12,
        padding: '14px 12px',
        position: 'relative',
        boxShadow: isHov ? `0 10px 32px ${c}20, 0 0 0 1px ${c}25` : 'none',
        transition: 'border-color .2s, box-shadow .2s',
        cursor: 'default',
      }}
    >
      {/* Header row */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
        <span style={{
          background: c + '18', border: `1px solid ${c}55`, color: c,
          borderRadius: 20, padding: '2px 8px', fontSize: 9, fontWeight: 800, letterSpacing: 1.5
        }}>KUMP {m.g}</span>
        <span style={{ fontSize:13 }}>{mood.icon}</span>
      </div>

      {/* Teams + Time */}
      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
        {/* Home */}
        <div style={{ flex:1, textAlign:'center' }}>
          <div style={{ fontSize:28, lineHeight:1 }}>{FLAGS[m.h] || '🏳'}</div>
          <div style={{ fontSize:10, fontWeight:700, color:'#C4D4E8', marginTop:4, lineHeight:1.3 }}>{m.h}</div>
        </div>
        {/* Center */}
        <div style={{ textAlign:'center', minWidth:62 }}>
          <div style={{
            fontSize:18, fontWeight:900, color:'#00E8FF',
            textShadow:'0 0 14px #00E8FFBB',
            fontFamily:'"Courier New",monospace', letterSpacing:2, lineHeight:1
          }}>{m.t}</div>
          <div style={{ fontSize:7, color:'#1E4870', fontWeight:800, letterSpacing:2.5, marginTop:1 }}>MYT</div>
          <div style={{ fontSize:8, color:'#122040', fontWeight:700, letterSpacing:1.5, marginTop:4 }}>VS</div>
        </div>
        {/* Away */}
        <div style={{ flex:1, textAlign:'center' }}>
          <div style={{ fontSize:28, lineHeight:1 }}>{FLAGS[m.a] || '🏳'}</div>
          <div style={{ fontSize:10, fontWeight:700, color:'#C4D4E8', marginTop:4, lineHeight:1.3 }}>{m.a}</div>
        </div>
      </div>

      {/* Venue */}
      <div style={{
        marginTop:10, paddingTop:7,
        borderTop:'1px solid rgba(12,36,80,0.6)',
        fontSize:9, color:'#1E3855', textAlign:'center', letterSpacing:.3
      }}>📍 {m.v}</div>

      {isToday && (
        <div style={{
          position:'absolute', top:0, right:10,
          background:'#DC2626', color:'#fff',
          fontSize:7, fontWeight:800, padding:'2px 7px',
          borderBottomLeftRadius:5, borderBottomRightRadius:5, letterSpacing:1.5
        }}>HARI INI</div>
      )}
    </div>
  );
}

  const mood = getMood(m.t);
  return (
    <div
      className="mcard"
      onMouseEnter={onEnter}

        background: isFinal ? 'rgba(14,11,3,0.98)' : 'rgba(7,16,38,0.96)',

  const [grp, setGrp]     = useState('ALL');
  const [q,   setQ]       = useState('');
  const [hovId, setHovId] = useState(null);

  const TABS = [
    {id:'GS',    label:'⚽ Kumpulan'},
    {id:'R32',   label:'P.32'},
    {id:'R16',   label:'P.16'},
    {id:'QF',    label:'S/Akhir'},
    {id:'SF',    label:'S.Akhir'},
    {id:'BRONZE',label:'3rd 🥉'},
    {id:'FINAL', label:'FINAL 🏆'},
  ];

  const matches = useMemo(() => {
    let arr = tab === 'GS' ? GS : KO.filter(m => m.phase === tab);
    if (tab === 'GS' && grp !== 'ALL') arr = arr.filter(m => m.g === grp);
    if (q.trim()) {
      const lq = q.toLowerCase();
      arr = arr.filter(m =>
        (m.h||'').toLowerCase().includes(lq) ||
        (m.a||'').toLowerCase().includes(lq) ||
        (m.v||'').toLowerCase().includes(lq)
      );
    }
    return arr;
  }, [tab, grp, q]);

  const byDate = useMemo(() => {
    const map = {};
    for (const m of matches) {
      if (!map[m.d]) map[m.d] = [];
      map[m.d].push(m);
    }
    return Object.entries(map).sort(([a],[b]) => (a < b ? -1 : 1));
  }, [matches]);

  const isGS = tab === 'GS';

  return (
    <div style={{
      background:'#030C1E',
      minHeight:'100vh',
      color:'#E8F0FF',
      fontFamily:'"Inter","Segoe UI",system-ui,sans-serif',
    }}>
      <style>{`
        @keyframes blink {0%,100%{opacity:1}50%{opacity:0.2}}
        @keyframes shimmer {0%{opacity:.7}50%{opacity:1}100%{opacity:.7}}
        .mcard {transition:transform .15s ease, box-shadow .2s ease;}
        .mcard:hover {transform:translateY(-3px);}
        * {box-sizing:border-box;}
        ::-webkit-scrollbar {height:4px;width:4px;}
        ::-webkit-scrollbar-track {background:rgba(0,0,0,0.1);}
        ::-webkit-scrollbar-thumb {background:rgba(30,80,160,0.45);border-radius:4px;}
        input::placeholder {color:#1A3050;}
        input:focus {outline:none;border-color:rgba(0,232,255,0.5)!important;}
        button:focus {outline:none;}
      `}</style>

      {/* ── HERO ────────────────────────────────────────── */}
      <div style={{
        background:'linear-gradient(180deg, #0B1D44 0%, #040C22 100%)',
        borderBottom:'1px solid rgba(245,197,24,0.18)',
        padding:'26px 20px 20px',
        textAlign:'center',
        position:'relative',
        overflow:'hidden',
      }}>
        {/* Floodlight glow */}
        <div style={{
          position:'absolute',top:-60,left:'50%',transform:'translateX(-50%)',
          width:'70%',height:220,
          background:'radial-gradient(ellipse, rgba(0,180,255,0.07) 0%, transparent 70%)',
          pointerEvents:'none'
        }}/>
        {/* Trophy glow */}
        <div style={{
          position:'absolute',bottom:-20,right:-20,
          fontSize:120,opacity:0.04,transform:'rotate(-15deg)',
          lineHeight:1,userSelect:'none'
        }}>🏆</div>

        {/* Brand */}
        <div style={{
          fontSize:10,letterSpacing:4.5,color:'#F5C518',
          marginBottom:10,fontWeight:800,animation:'shimmer 3s ease infinite'
        }}>⚽ FIFA WORLD CUP 2026™ ⚽</div>

        <div style={{
          fontSize:'clamp(28px,6.5vw,56px)',
          fontWeight:900,color:'#FFFFFF',
          letterSpacing:-1.5,lineHeight:.95,
          textShadow:'0 2px 20px rgba(0,0,0,0.6)'
        }}>JADUAL RASMI</div>

        <div style={{
          fontSize:'clamp(13px,3vw,20px)',
          fontWeight:700,color:'#00E8FF',
          textShadow:'0 0 24px #00E8FF60',
          letterSpacing:1.5,marginTop:6
        }}>WAKTU MALAYSIA · MYT (UTC+8)</div>

        <div style={{
          display:'flex',justifyContent:'center',flexWrap:'wrap',
          gap:'4px 18px',marginTop:14,fontSize:11,color:'#2A4568'
        }}>
          <span>🇲🇽 Mexico · 🇨🇦 Kanada · 🇺🇸 USA</span>
          <span>·</span>
          <span>104 Perlawanan · 48 Pasukan</span>
          <span>·</span>
          <span>11 Jun – 20 Jul 2026</span>
        </div>

        {/* Legend */}
        <div style={{
          display:'inline-flex',flexWrap:'wrap',justifyContent:'center',
          gap:'4px 14px',marginTop:12,
          background:'rgba(0,0,0,0.2)',borderRadius:20,
          padding:'6px 14px',fontSize:10,color:'#1E3C5A'
        }}>
          {[['🌙','00–06 Tengah Malam'],['🌅','06–12 Awal Pagi'],
            ['☀️','12–17 Tengahari'],['🌆','17–24 Malam']].map(([i,l])=>(
            <span key={l}>{i} {l}</span>
          ))}
        </div>
      </div>

      {/* ── PHASE TABS ──────────────────────────────────── */}
      <div style={{
        background:'rgba(3,8,20,0.95)',
        borderBottom:'1px solid rgba(15,40,90,0.4)',
        padding:'10px 14px',
        display:'flex',gap:6,
        overflowX:'auto',WebkitOverflowScrolling:'touch',
      }}>
        {TABS.map(t => (
          <button key={t.id}
            onClick={() => { setTab(t.id); setGrp('ALL'); setQ(''); }}
            style={{
              background: tab===t.id ? '#F5C518' : 'rgba(10,24,56,0.85)',
              color:       tab===t.id ? '#0A0800' : '#3A5878',
              border:      tab===t.id ? 'none' : '1px solid rgba(20,50,100,0.35)',
              borderRadius:20, padding:'7px 14px', fontSize:11, fontWeight:800,
              cursor:'pointer', whiteSpace:'nowrap', letterSpacing:.3,
              transition:'all .15s',
              boxShadow: tab===t.id ? '0 2px 12px rgba(245,197,24,0.3)' : 'none',
            }}
          >{t.label}</button>
        ))}
      </div>

      {/* ── GROUP FILTER ────────────────────────────────── */}
      {isGS && (
        <div style={{
          background:'rgba(3,8,20,0.9)',
          padding:'8px 14px',display:'flex',gap:5,
          overflowX:'auto',WebkitOverflowScrolling:'touch',
          borderBottom:'1px solid rgba(12,32,72,0.35)'
        }}>
          {/* "Semua" chip */}
          <button onClick={() => setGrp('ALL')} style={{
            background: grp==='ALL' ? 'rgba(245,197,24,0.12)' : 'transparent',
            color:       grp==='ALL' ? '#F5C518' : '#2A4060',
            border:     `1px solid ${grp==='ALL' ? 'rgba(245,197,24,0.4)' : 'rgba(18,45,90,0.35)'}`,
            borderRadius:20,padding:'5px 12px',fontSize:10,fontWeight:800,
            cursor:'pointer',whiteSpace:'nowrap',letterSpacing:1
          }}>SEMUA</button>

          {'ABCDEFGHIJKL'.split('').map(g => (
            <button key={g} onClick={() => setGrp(g)} style={{
              background: grp===g ? GC[g]+'20' : 'transparent',
              color:       grp===g ? GC[g] : '#2A4060',
              border:     `1px solid ${grp===g ? GC[g]+'66' : 'rgba(18,45,90,0.35)'}`,
              borderRadius:20,padding:'5px 10px',fontSize:10,fontWeight:800,
              cursor:'pointer',whiteSpace:'nowrap',
            }}>{g}</button>
          ))}
        </div>
      )}

      {/* Group info strip */}
      {isGS && grp !== 'ALL' && GROUPS[grp] && (
        <div style={{
          margin:'8px 14px 2px',
          background: GC[grp]+'0C',
          border:`1px solid ${GC[grp]}30`,
          borderRadius:8, padding:'9px 14px',
          display:'flex',flexWrap:'wrap',gap:'4px 16px',alignItems:'center'
        }}>
          <span style={{ color:GC[grp], fontWeight:800, fontSize:11, letterSpacing:1.5 }}>
            KUMPULAN {grp}
          </span>
          {GROUPS[grp].map(t => (
            <span key={t} style={{ fontSize:12, color:'#3A5878' }}>
              {FLAGS[t]} {t}
            </span>
          ))}
        </div>
      )}

      {/* ── SEARCH ──────────────────────────────────────── */}
      <div style={{ padding:'8px 14px 6px' }}>
        <input
          type="text"
          placeholder="🔍  Cari pasukan atau bandar..."
          value={q}
          onChange={e => setQ(e.target.value)}
          style={{
            width:'100%',
            background:'rgba(6,14,34,0.85)',
            border:'1px solid rgba(16,40,90,0.45)',
            borderRadius:8,padding:'9px 14px',
            color:'#C4D4E8',fontSize:13,
            transition:'border-color .2s'
          }}
        />
      </div>

      {/* ── MATCH LIST ──────────────────────────────────── */}
      <div style={{ padding:'4px 14px 52px' }}>
        {byDate.length === 0 && (
          <div style={{ textAlign:'center', color:'#1A3048', padding:56, fontSize:14 }}>
            Tiada perlawanan dijumpai.
          </div>
        )}

        {byDate.map(([date, ms]) => (
          <div key={date} style={{ marginBottom:22 }}>
            {/* Date header */}
            <div style={{ display:'flex', alignItems:'center', gap:10, margin:'10px 0 12px' }}>
              <div style={{ flex:1, height:1, background:'linear-gradient(to right,rgba(16,44,100,0.5),transparent)' }}/>
              <div style={{
                background: date===TODAY ? '#B91C1C' : 'rgba(8,20,48,0.9)',
                border:     date===TODAY ? 'none' : '1px solid rgba(16,44,100,0.35)',
                borderRadius:20, padding:'5px 14px',
                fontSize:11, fontWeight:700,
                color: date===TODAY ? '#fff' : '#3A5878',
                whiteSpace:'nowrap',
                display:'flex',alignItems:'center',gap:6,
                boxShadow: date===TODAY ? '0 0 16px rgba(185,28,28,0.4)' : 'none'
              }}>
                {date===TODAY && <span style={{
                  width:5,height:5,borderRadius:'50%',
                  background:'#FCA5A5',display:'inline-block',
                  animation:'blink 1.2s ease infinite'
                }}/>}
                {fmtDate(date)}
                {date===TODAY && ' · HARI INI'}
              </div>
              <div style={{ flex:1, height:1, background:'linear-gradient(to left,rgba(16,44,100,0.5),transparent)' }}/>
            </div>

            {/* Cards grid */}
            <div style={{
              display:'grid',
              gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',
              gap:10
            }}>
              {ms.map(m => isGS ? (
                <GroupCard
                  key={m.id} m={m}
                  isHov={hovId===m.id}
                  onEnter={() => setHovId(m.id)}
                  onLeave={() => setHovId(null)}
                />
              ) : (
                <KoCard
                  key={m.id} m={m}
                  isHov={hovId===m.id}
                  onEnter={() => setHovId(m.id)}
                  onLeave={() => setHovId(null)}
                />
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* ── FOOTER ──────────────────────────────────────── */}
      <div style={{
        textAlign:'center',padding:'16px 20px',
        borderTop:'1px solid rgba(12,32,72,0.3)',
        fontSize:9,color:'#0E2038',lineHeight:1.9
      }}>
        Semua waktu dalam MYT (UTC+8) · Sumber: FIFA / Al Jazeera / ESPN<br/>
        FIFA World Cup 2026™ · 48 Pasukan · 104 Perlawanan · USA · Kanada · Mexico
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
