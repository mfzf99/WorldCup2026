    function fmtDate(s) {
      const d = new Date(s + 'T12:00:00');
      return `${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    }

    function getMood(t) {
      const h = parseInt(t);
      if (h < 6)  return { icon:'🌙', label:'Tengah Malam' };
      if (h < 12) return { icon:'🌅', label:'Awal Pagi' };
      if (h < 17) return { icon:'☀️', label:'Tengahari' };
      return { icon:'🌆', label:'Malam' };
    }

    // Mengira status perlawanan berdasarkan masa sebenar sistem
    function getMatchStatus(dateStr, timeStr) {
      const matchTime = new Date(`${dateStr}T${timeStr}:00`);
      const now = new Date();
      const diffMs = now - matchTime;
      const diffHours = diffMs / (1000 * 60 * 60);

      if (diffHours >= 0 && diffHours <= 2) {
        return { code: 'LIVE', label: 'LIVE 🔥', class: 'bg-red-500 text-white animate-pulse shadow-lg shadow-red-500/50' };
      } else if (diffHours > 2) {
        return { code: 'TAMAT', label: 'TAMAT', class: 'bg-slate-800 text-slate-400 border border-slate-700' };
      } else {
        return { code: 'AKAN_DATANG', label: 'AKAN DATANG', class: 'bg-cyan-950 text-cyan-400 border border-cyan-500/30' };
      }
    }

              <div class="text-center px-4">
                <div class="mono text-lg font-black tracking-wider" style={{ color: c, textShadow: `0 0 10px ${c}60` }}>{m.t}</div>
                <div class="text-[8px] font-extrabold tracking-widest text-slate-500 mt-0.5">MYT</div>
              </div>
              <div class="text-center flex-1">
                <div class="text-2xl opacity-20">⚽</div>
                <div class="text-[10px] text-slate-500 italic mt-1 font-medium">Belum Pasti</div>
              </div>
            </div>
          </div>

          <div class="mt-4 pt-3 border-t border-slate-800/60 flex items-center justify-between text-[10px]">
            <span class="text-slate-500">📍 {m.v}</span>
            <span class={`px-2 py-0.5 rounded font-black tracking-wider text-[9px] ${status.class}`}>{status.label}</span>
          </div>
        </div>
      );
    }

    // ── APP INDUK ─────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState('GS');
      const [grp, setGrp] = useState('ALL');
      const [statusFilter, setStatusFilter] = useState('ALL');
      const [favOnly, setFavOnly] = useState(false);
      const [q, setQ] = useState('');
      const [favTeams, setFavTeams] = useState(() => {
        const saved = localStorage.getItem('wc2026_fav_teams');
        return saved ? JSON.parse(saved) : [];
      });

      useEffect(() => {
        localStorage.setItem('wc2026_fav_teams', JSON.stringify(favTeams));
      }, [favTeams]);

      const toggleFav = (teamA, teamB) => {
        setFavTeams(prev => {
          let updated = [...prev];
          [teamA, teamB].forEach(team => {
            if (updated.includes(team)) {
              // Jika dah ada, kita hanya buang kalau user klik unstar (logik dipermudah untuk pasang/padam kelompok)
              // Untuk elak salah buang team lain, kita check satu-satu
            }
          });
          // Logik toggle bersih berasaskan team individu
          const hasA = prev.includes(teamA);
          const hasB = prev.includes(teamB);
          
          if (hasA && hasB) {
            return prev.filter(t => t !== teamA && t !== teamB);
          } else {
            return [...new Set([...prev, teamA, teamB])];
          }
        });
      };

      const TABS = [
        {id:'GS',    label:'⚽ Peringkat Kumpulan'},
        {id:'R32',   label:'Pusingan 32'},
        {id:'R16',   label:'Pusingan 16'},
        {id:'QF',    label:'Suku Akhir'},
        {id:'SF',    label:'Separuh Akhir'},
        {id:'BRONZE',label:'Tempat ke-3 🥉'},
        {id:'FINAL', label:'FINAL 🏆'},
      ];

      // Tapis perlawanan secara menyeluruh
      const filteredMatches = useMemo(() => {
        let arr = tab === 'GS' ? GS : KO.filter(m => m.phase === tab);
        
        if (tab === 'GS' && grp !== 'ALL') arr = arr.filter(m => m.g === grp);
        
        if (statusFilter !== 'ALL') {
          arr = arr.filter(m => getMatchStatus(m.d, m.t).code === statusFilter);
        }

        if (favOnly) {
          arr = arr.filter(m => favTeams.includes(m.h) || favTeams.includes(m.a));
        }

        if (q.trim()) {
          const lq = q.toLowerCase();
          arr = arr.filter(m =>
            (m.h||'').toLowerCase().includes(lq) ||
            (m.a||'').toLowerCase().includes(lq) ||
            (m.v||'').toLowerCase().includes(lq)
          );
        }
        return arr;
      }, [tab, grp, statusFilter, favOnly, q, favTeams]);

      // Atur data mengikut tarikh perlawanan
      const groupedByDate = useMemo(() => {
        const map = {};
        for (const m of filteredMatches) {
          if (!map[m.d]) map[m.d] = [];
          map[m.d].push(m);
        }
        return Object.entries(map).sort(([a],[b]) => (a < b ? -1 : 1));
      }, [filteredMatches]);

      // Ambil 1 perlawanan akan datang yang terdekat untuk kaunter
      const nextMatch = useMemo(() => {
        const now = new Date();
        const all = [...GS, ...KO].sort((a,b) => new Date(`${a.d}T${a.t}`) - new Date(`${b.d}T${b.t}`));
        return all.find(m => new Date(`${m.d}T${m.t}`) - now > 0);
      }, []);

      const isGS = tab === 'GS';
      const todayStr = new Date().toLocaleDateString('sv-SE');

      return (
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fadeIn">
          
          {/* ── HEADER HERO ────────────────────────────────── */}
          <div class="relative rounded-3xl overflow-hidden glass border border-slate-800/80 p-6 sm:p-10 mb-8 shadow-2xl shadow-cyan-950/20">
            <div class="absolute -top-24 -left-20 w-80 height-80 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute -bottom-24 -right-20 w-80 height-80 bg-amber-500/5 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 relative z-10">
              <div>
                <span class="text-xs font-extrabold tracking-widest text-amber-400 uppercase bg-amber-400/10 border border-amber-400/20 px-3 py-1 rounded-full">
                  ⚡ ENGINE POLISHED VERSION
                </span>
                <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-white mt-3 bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text">
                  JADUAL PIALA DUNIA 2026
                </h1>
                <p class="text-cyan-400 font-bold tracking-wide mt-2 text-sm sm:text-base">
                  WAKTU MALAYSIA · MYT (UTC+8)
                </p>
                <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-xs text-slate-400 mt-4 font-medium">
                  <span>🇲🇽 Mexico · 🇨🇦 Kanada · 🇺🇸 USA</span>
                  <span class="text-slate-700">•</span>
                  <span>104 Perlawanan</span>
                  <span class="text-slate-700">•</span>
                  <span>11 Jun – 20 Jul 2026</span>
                </div>
              </div>

              {/* Countdown & Live Widget */}
              {nextMatch && (
                <div class="bg-slate-950/60 border border-slate-800 p-4 rounded-2xl min-w-[260px] shadow-inner">
                  <div class="text-[10px] font-bold tracking-widest text-slate-500 uppercase">Perlawanan Seterusnya</div>
                  <div class="flex items-center gap-2 mt-2">
                    <span class="text-xl">{FLAGS[nextMatch.h] || '⚽'}</span>
                    <span class="text-xs font-bold truncate max-w-[140px]">{nextMatch.h || 'Kalah Mati'} vs {nextMatch.a || 'Kalah Mati'}</span>
                  </div>
                  <div class="mt-3 flex items-baseline gap-2">
                    <span class="mono text-2xl font-black text-amber-400">{nextMatch.t}</span>
                    <span class="text-[10px] text-slate-400 font-semibold">{fmtDate(nextMatch.d)}</span>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* ── INTERFACE NAVIGATION & FILTERS ──────────────── */}
          <div class="sticky top-4 z-40 bg-slate-950/80 backdrop-blur-md p-3 rounded-2xl border border-slate-800/80 shadow-xl mb-6">
            <div class="flex gap-2 overflow-x-auto pb-2 sm:pb-0 no-scrollbar">
              {TABS.map(t => (
                <button
                  key={t.id}
                  onClick={() => { setTab(t.id); setGrp('ALL'); }}
                  class={`px-4 py-2 rounded-xl text-xs font-extrabold tracking-wide whitespace-nowrap transition-all duration-200 ${
                    tab === t.id 
                      ? 'bg-gradient-to-r from-amber-400 to-amber-500 text-slate-950 shadow-md shadow-amber-500/20 scale-[1.02]' 
                      : 'bg-slate-900/60 text-slate-400 hover:text-white hover:bg-slate-800/60 border border-slate-800/40'
                  }`}
                >
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* ── CONSOLE PENAPISAN (SECONDARY FILTERS) ───────── */}
          <div class="glass border border-slate-800/60 rounded-2xl p-4 mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
            
            {/* Input Carian */}
            <div class="relative">
              <input 
                type="text" 
                placeholder="Cari negara, bandar stadium..."
                value={q}
                onChange={e => setQ(e.target.value)}
                class="w-full bg-slate-950/80 border border-slate-800 rounded-xl px-4 py-2.5 text-xs text-slate-300 focus:outline-none focus:border-cyan-500/50 placeholder-slate-600 font-medium transition-colors"
              />
            </div>

            {/* Filter Status Dinamik */}
            <div class="flex gap-2">
              {['ALL', 'LIVE', 'AKAN_DATANG', 'TAMAT'].map(status => (
                <button
                  key={status}
                  onClick={() => setStatusFilter(status)}
                  class={`flex-1 py-2 px-1 rounded-xl text-[10px] font-bold border transition-all ${
                    statusFilter === status 
                      ? 'bg-cyan-500/10 text-cyan-400 border-cyan-500/40' 
                      : 'bg-slate-950/40 text-slate-500 border-slate-900 hover:text-slate-300'
                  }`}
                >
                  {status === 'ALL' ? 'SEMUA' : status === 'LIVE' ? 'LIVE 🔥' : status === 'AKAN_DATANG' ? 'BELUM MULA' : 'TAMAT'}
                </button>
              ))}
            </div>

            {/* Bookmark Filter Switch */}
            <div class="flex items-center justify-end">
              <button
                onClick={() => setFavOnly(!favOnly)}
                class={`w-full md:w-auto px-4 py-2.5 rounded-xl text-xs font-bold border flex items-center justify-center gap-2 transition-all ${
                  favOnly 
                    ? 'bg-amber-400/10 text-amber-400 border-amber-400/30' 
                    : 'bg-slate-950/40 text-slate-500 border-slate-900 hover:text-slate-400'
                }`}
              >
                <span>{favOnly ? '⭐ Memaparkan Pilihan Kau' : '☆ Tapis Pasukan Kegemaran'}</span>
                {favTeams.length > 0 && <span class="bg-amber-400 text-slate-950 text-[9px] px-1.5 py-0.5 rounded-full font-black">{favTeams.length}</span>}
              </button>
            </div>
          </div>

          {/* CHIPS KUMPULAN (Hanya keluar bila dalam Tab Gs) */}
          {isGS && (
            <div class="flex gap-1.5 overflow-x-auto pb-4 no-scrollbar">
              <button
                onClick={() => setGrp('ALL')}
                class={`px-3 py-1.5 rounded-lg text-[10px] font-black tracking-wider transition-all ${
                  grp === 'ALL' ? 'bg-slate-100 text-slate-950' : 'bg-slate-900/60 text-slate-500 border border-slate-800/30'
                }`}
              >
                SEMUA KUMPULAN
              </button>
              {'ABCDEFGHIJKL'.split('').map(g => (
                <button
                  key={g}
                  onClick={() => setGrp(g)}
                  class={`px-3 py-1.5 rounded-lg text-[10px] font-black transition-all ${
                    grp === g 
                      ? 'text-white' 
                      : 'bg-slate-900/20 text-slate-500 hover:text-slate-400'
                  }`}
                  style={{ backgroundColor: grp === g ? GC[g] : '', border: `1px solid ${GC[g]}20` }}
                >
                  KUMP {g}
                </button>
              ))}
            </div>
          )}

          {/* INFORMASI KUMPULAN AKTIF */}
          {isGS && grp !== 'ALL' && GROUPS[grp] && (
            <div class="glass border rounded-xl p-3 mb-6 flex flex-wrap gap-4 items-center animate-slideIn" style={{ borderColor: `${GC[grp]}30`, background: `${GC[grp]}05` }}>
              <span class="text-xs font-black tracking-widest uppercase" style={{ color: GC[grp] }}>KUMPULAN {grp}:</span>
              <div class="flex flex-wrap gap-3">
                {GROUPS[grp].map(t => (
                  <span key={t} class={`text-xs font-semibold px-2 py-1 rounded bg-slate-900/80 border border-slate-800 ${favTeams.includes(t) ? 'text-amber-400 border-amber-500/30' : 'text-slate-300'}`}>
                    {FLAGS[t]} {t}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* ── SENARAI PERLAWANAN UTAMA ────────────────────── */}
          <div class="space-y-8">
            {groupedByDate.length === 0 ? (
              <div class="text-center text-slate-600 py-16 text-sm font-medium border border-dashed border-slate-900 rounded-2xl">
                📭 Tiada jadual perlawanan ditemui mengikut penapisan kau.
              </div>
            ) : (
              groupedByDate.map(([date, matches]) => {
                const isToday = date === todayStr;
                return (
                  <div key={date} class="relative">
                    {/* Pembahagi Tarikh */}
                    <div class="flex items-center gap-4 my-4 sticky top-16 z-30 py-2 bg-slate-1000">
                      <div class={`px-4 py-1.5 rounded-full text-xs font-extrabold tracking-wide flex items-center gap-2 ${
                        isToday ? 'bg-red-600 text-white shadow-md shadow-red-600/30' : 'bg-slate-900 text-slate-400 border border-slate-800'
                      }`}>
                        {isToday && <span class="w-2 h-2 rounded-full bg-white animate-ping"></span>}
                        {fmtDate(date)} {isToday && '· HARI INI'}
                      </div>
                      <div class="flex-1 h-[1px] bg-gradient-to-r from-slate-800 via-slate-950 to-transparent"></div>
                    </div>

                    {/* Grid Kad Perlawanan */}
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                      {matches.map(m => isGS ? (
                        <GroupCard 
                          key={m.id} 
                          m={m} 
                          isFav={favTeams.includes(m.h) || favTeams.includes(m.a)} 
                          toggleFav={toggleFav}
                        />
                      ) : (
                        <KoCard key={m.id} m={m} />
                      ))}
                    </div>
                  </div>
                );
              })
            )}
          </div>

          {/* FOOTER */}
          <footer class="mt-16 pt-6 border-t border-slate-900 text-center text-[10px] text-slate-600 font-medium tracking-wide leading-relaxed">
            Semua zon waktu telah diselaraskan ke Waktu Malaysia (MYT - UTC+8). <br />
            Data rujukan: FIFA / Al Jazeera / ESPN. Sedia untuk kegunaan premium peribadi.
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
